# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
# 
# 使用方式:
#   定时模式: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI模式: docker-compose -f ./docker/docker-compose.yml up -d server
#   同时启动: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）。这一步只在容器启动瞬间把 .env 内容灌进环境变量，
  # 之后网页/API 对配置的写入不会经过这里，所以还需要下面的目录挂载 + ENV_FILE。
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # Claude Code CLI 登录凭证（可选，仅 GENERATION_BACKEND=claude_code_cli 时使用）。
    # 直接只读挂载宿主机真实凭证文件（不是快照复制），跟随本机 Claude Code 的
    # OAuth token 自动刷新，避免快照过期导致 login_required。:ro 防止容器写回宿主机。
    - ${USERPROFILE}/.claude/.credentials.json:/home/dsa/.claude/.credentials.json:ro
    # 如需覆盖前端静态资源，可挂载本地 static 目录
    # - ../static:/app/static:ro
    # 挂载项目根目录（而非单独挂载 .env 单一文件——单文件 volume 会阻止配置保存时
    # os.replace 的原子重命名）。配合下方 ENV_FILE，让网页/API 对运行时配置的写入
    # 直接落到宿主机的 ../.env，下次重启时 env_file 读到的就是最新内容。
    - ..:/app/hostroot

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT 从 .env 文件读取，无需在此硬编码
    # 运行时配置读写改指向宿主机挂载的 .env（见上方 ..:/app/hostroot），
    # 而不是容器内独立、重启即丢失的 /app/.env 副本。
    - ENV_FILE=/app/hostroot/.env

    # 代理设置（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 资源限制：完整分析建议 1G+；512M 仅适合轻量 Web/API、单股、低并发场景，
  # 且建议设置 MAX_WORKERS=1 并避免同时启动 analyzer 和 server。
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M

services:
  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # 若使用 network_mode: host，则以下 ports 映射无效，端口由 command 中的 --port 指定
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
